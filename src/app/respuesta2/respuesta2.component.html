<div>
    <h2>Calculadora de Plan de Pago</h2>
  
    <label for="prestamo">Monto del Préstamo:</label>
    <input type="number" id="prestamo" (input)="actualizarPrestamo($event)" />
  
    <button (click)="calcularPlanDePago()">Calcular</button>
  
    <div>
      <h3>Número de cuotas: {{ cuotas }}</h3>
      <h3>Monto por cuota: ${{ montoPorCuota }}</h3>
    </div>
  </div>
